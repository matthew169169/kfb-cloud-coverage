<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>KFB Cloud Coverage</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.45; }
    h1 { font-size: 1.35rem; margin-bottom: 0.2rem; }
    .ver { color: #666; font-size: 0.85rem; margin-bottom: 0.75rem; }
    p.sub { color: #444; margin-top: 0; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1.25rem 0; }
    input[type=file] { width: 100%; }
    button { margin-top: 0.75rem; padding: 0.55rem 1rem; font-size: 1rem; cursor: pointer; }
    .result { background: #f4f7fb; border-left: 4px solid #2b6cb0; padding: 0.85rem 1rem; margin-top: 1rem; white-space: pre-wrap; }
    .err { background: #fff5f5; border-left-color: #c53030; }
    .note { font-size: 0.9rem; color: #555; }
    img.preview { max-width: 100%; margin-top: 0.75rem; border-radius: 6px; display: none; }
    .dbg { font-size: 0.8rem; color: #666; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>KFB Cloud Coverage</h1>
  <div class="ver">Detector v5 — if you don’t see “v5”, hard-refresh (Cmd+Shift+R)</div>
  <p class="sub">Upload a weather-camera photo. Analysis runs <strong>on your device</strong> — nothing is uploaded to a server.</p>

  <div class="box">
    <label for="photo">Photo</label><br/>
    <input id="photo" type="file" accept="image/*"/>
    <br/>
    <button id="go" type="button">Analyze</button>
    <img id="preview" class="preview" alt="preview"/>
  </div>

  <div id="out" class="result" style="display:none"></div>
  <div id="dbg" class="dbg"></div>
  <p class="note">Public GitHub Pages app. Camera altitude reference: ~150 m.</p>

  <script>
const DAY_BRIGHT_MIN = 80;
const CAMERA_ALT_M = 150;
const VERSION = "v5";

function formatMessage(inside, period) {
  if (inside) {
    return "Camera is inside cloud (" + period + "). Cloud base at or below ~" + CAMERA_ALT_M + " m.";
  }
  return "I am not inside cloud (" + period + "). The cloud base should be above " + CAMERA_ALT_M + " m.";
}

function loadImageToCanvas(file) {
  return new Promise(function (resolve, reject) {
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.onload = function () {
      var maxSide = 640;
      var w = img.width;
      var h = img.height;
      var scale = Math.min(1, maxSide / Math.max(w, h));
      w = Math.max(1, Math.round(w * scale));
      h = Math.max(1, Math.round(h * scale));
      var canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve({ ctx: ctx, w: w, h: h });
    };
    img.onerror = function () {
      URL.revokeObjectURL(url);
      reject(new Error("Could not read image"));
    };
    img.src = url;
  });
}

function extractFeatures(ctx, w, h) {
  var y0 = Math.floor(h * 0.08);
  var cropH = Math.max(1, h - y0);
  var data = ctx.getImageData(0, y0, w, cropH).data;
  var n = w * cropH;
  var gray = new Float32Array(n);
  var sum = 0, satSum = 0, brightSpots = 0, i, o, r, g, b, gy;

  for (i = 0; i < n; i++) {
    o = i * 4;
    r = data[o]; g = data[o + 1]; b = data[o + 2];
    gy = (r + g + b) / 3;
    gray[i] = gy;
    sum += gy;
    satSum += (Math.max(r, g, b) - Math.min(r, g, b)) / 255;
    if (gy > 200) brightSpots += 1;
  }

  var mean = sum / n;
  var varSum = 0;
  for (i = 0; i < n; i++) {
    var d = gray[i] - mean;
    varSum += d * d;
  }
  var std = Math.sqrt(varSum / n);

  var mid = Math.floor(cropH / 2);
  var upperSum = 0, lowerSum = 0, upperN = mid * w;
  for (i = 0; i < upperN; i++) upperSum += gray[i];
  for (i = upperN; i < n; i++) lowerSum += gray[i];
  var upper = upperSum / Math.max(1, upperN);
  var lower = lowerSum / Math.max(1, n - upperN);

  var fy0 = Math.floor(cropH * 0.05);
  var fy1 = Math.max(fy0 + 1, Math.floor(cropH * 0.72));
  var farSum = 0, farSumSq = 0, farWash = 0, farN = 0;
  var gx = 0, gySum = 0, gxN = 0, gyN = 0;
  var y, x, v;
  for (y = fy0; y < fy1; y++) {
    for (x = 0; x < w; x++) {
      v = gray[y * w + x];
      farSum += v;
      farSumSq += v * v;
      farN += 1;
      if (v > 170) farWash += 1;
      if (x + 1 < w) {
        gx += Math.abs(v - gray[y * w + (x + 1)]);
        gxN += 1;
      }
      if (y + 1 < fy1) {
        gySum += Math.abs(v - gray[(y + 1) * w + x]);
        gyN += 1;
      }
    }
  }
  var farMean = farSum / farN;
  var farStd = Math.sqrt(Math.max(0, farSumSq / farN - farMean * farMean));
  var farGrad = gx / Math.max(1, gxN) + gySum / Math.max(1, gyN);

  return {
    brightness_mean: mean,
    brightness_std: std,
    saturation_mean: satSum / n,
    upper_lower_contrast: Math.abs(upper - lower) / 255,
    bright_spot_ratio: brightSpots / n,
    far_grad: farGrad,
    far_wash: farWash / farN,
    far_std: farStd,
    is_day: mean >= DAY_BRIGHT_MIN ? 1 : 0
  };
}

function heuristicInside(feats) {
  if (feats.is_day >= 0.5) {
    if (feats.far_wash >= 0.60 && feats.far_grad <= 5.0) return true;
    if (feats.far_std <= 30.0 && feats.far_wash >= 0.75) return true;
    if (feats.far_wash >= 0.85 && feats.far_grad <= 6.0) return true;
    return false;
  }
  if (feats.bright_spot_ratio >= 0.004) return false;
  if (feats.bright_spot_ratio < 0.0015 && feats.brightness_std < 22.0) return true;
  if (
    feats.bright_spot_ratio < 0.003 &&
    feats.brightness_std < 30.0 &&
    feats.upper_lower_contrast < 0.1
  ) return true;
  return false;
}

function setOut(text, isErr) {
  var out = document.getElementById("out");
  out.style.display = "block";
  out.className = "result" + (isErr ? " err" : "");
  out.textContent = text;
}

document.getElementById("go").addEventListener("click", async function () {
  var input = document.getElementById("photo");
  var file = input.files && input.files[0];
  if (!file) {
    setOut("Please choose a photo.", true);
    return;
  }
  setOut("Analyzing on your device…", false);
  try {
    var packed = await loadImageToCanvas(file);
    var preview = document.getElementById("preview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
    var feats = extractFeatures(packed.ctx, packed.w, packed.h);
    var period = feats.is_day >= 0.5 ? "day" : "night";
    var inside = heuristicInside(feats);
    setOut(formatMessage(inside, period), false);
    document.getElementById("dbg").textContent =
      VERSION +
      " | far_grad=" + feats.far_grad.toFixed(2) +
      " far_wash=" + feats.far_wash.toFixed(2) +
      " far_std=" + feats.far_std.toFixed(1) +
      " → " + (inside ? "inside_cloud" : "not_inside");
  } catch (e) {
    setOut("Could not analyze: " + (e && e.message ? e.message : e), true);
  }
});
  </script>
</body>
</html>
