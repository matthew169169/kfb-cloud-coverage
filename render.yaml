services:
  - type: web
    name: kfb-cloud-coverage
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.web
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
